name: Generate Twitter Drafts

on:
  push:
    branches: [master]
    paths:
      - "docs/blog/*.md"
  workflow_dispatch:

jobs:
  generate-drafts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate Twitter drafts for all ready articles
        run: node scripts/generate-twitter-draft.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push drafts
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/blog/
          git commit -m "Generate Twitter drafts for new articles"
          git push
